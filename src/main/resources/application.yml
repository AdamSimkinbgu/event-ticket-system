spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ticketing}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    # No explicit dialect: Hibernate auto-detects it per connection (PostgreSQL on the
    # deploy/run target, H2 in dev and the @DataJpaTest contract tests), so one config
    # serves every backend — a config-only switch to the cloud DB.

  # Activating the `dev` profile also activates `jpa`, so dev develops on the real
  # persistence path (JPA + H2 — see application-dev.yml). Deploy/run = `jpa` + Postgres.
  profiles:
    group:
      dev: jpa
      # Running against Supabase: `supabase` activates the JPA stack + the SSL/pooler datasource
      # (see application-supabase.yml). Run with SPRING_PROFILES_ACTIVE=supabase + the DB_* env vars.
      supabase: jpa

# JWT signing secret (consumed by Infrastructure/security/JwtSessionManager — UC-12).
# In production the secret MUST be supplied via environment variable, never committed.
jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-override-in-prod-must-be-at-least-256-bits-long}

# Session TTLs (auth rework / unified Session aggregate).
# Member sessions are absolute; Guest sessions are idle-bounded. The JWT's exp
# claim and the Session row's expiresAt are kept in sync by JwtSessionManager.
session:
  member-ttl-minutes: ${SESSION_MEMBER_TTL_MINUTES:1440}
  guest-idle-timeout-minutes: ${SESSION_GUEST_IDLE_TIMEOUT_MINUTES:30}

# Brute-force lock-after-N policy (SLR.2 #148) for member + admin sign-in.
# max-attempts: 0 disables the lockout entirely.
auth:
  lockout:
    max-attempts: ${AUTH_LOCKOUT_MAX_ATTEMPTS:5}
    lock-minutes: ${AUTH_LOCKOUT_LOCK_MINUTES:15}


constants:
  # System-wide constant
  ticket-reservation-duration: ${TICKET_RESERVATION_DURATION:10}
  order-expiration-duration: ${ORDER_EXPIRATION_DURATION:60}


# System Analytics dashboard (UC-46 / #43, #279).
#  - rate-window-minutes: trailing window the per-minute rates are computed over.
#  - refresh-interval-ms: how often the dashboard auto-refreshes its KPIs in the
#    browser (Vaadin poll). 0 disables auto-refresh (manual "Refresh" still works).
analytics:
  rate-window-minutes: ${ANALYTICS_RATE_WINDOW_MINUTES:5}
  refresh-interval-ms: ${ANALYTICS_REFRESH_INTERVAL_MS:5000}


# Actuator (SLR.8.1 telemetry / SLR.8.2 logging visibility).
# Restrict in production by listing only the endpoints you actually want exposed.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Vaadin Flow (V2-F-01).
#  - launch-browser=false: don't auto-open browser on `mvn spring-boot:run`
#  - allowed-packages: restrict component / route scan to our package to keep
#    startup fast (without this, Vaadin scans the whole classpath).
#  - productionMode is NOT set here on purpose — it's controlled by the
#    Maven `production` profile, not by yml.
vaadin:
  launch-browser: false
  allowed-packages: com.ticketing.system.Presentation

# Default System Admin (UC-1 / I.1.4) — auto-created at initialization when none exists.
# Defaults live here only; override in production via env, and never ship the default password.
platform:
  admin:
    username: ${PLATFORM_ADMIN_USERNAME:admin}
    password: ${PLATFORM_ADMIN_PASSWORD:admin}

# WSEP external systems (UC-33 payment / UC-34 issuance). WsepPaymentGateway /
# WsepTicketIssuer back IPaymentGateway / ITicketIssuer in every real run
# (@Profile("!test")); the test profile swaps in the in-process stubs. base-url is
# the single koyeb endpoint both adapters POST to.
wsep:
  base-url: ${WSEP_BASE_URL:https://damp-lynna-wsep-1984852e.koyeb.app/}
  # The reachability handshake is retried (idempotent) so a cold-starting WSEP host doesn't leave the
  # market closed at boot (#455/#365). pay/issue/refund are never retried (non-idempotent).
  handshake-attempts: ${WSEP_HANDSHAKE_ATTEMPTS:3}
  handshake-backoff-ms: ${WSEP_HANDSHAKE_BACKOFF_MS:1000}

# Market self-heal (dev): if a transient external-service outage leaves the market closed at boot,
# MarketSelfHealScheduler re-attempts the open on this interval until it succeeds (recover, no restart).
market:
  self-heal-delay-ms: ${MARKET_SELF_HEAL_DELAY_MS:30000}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ticketing}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# JWT (consumed by Infrastructure/security/JwtSessionManager — UC-12).
# In production the secret MUST be supplied via environment variable, never committed.
jwt:
  secret: ${JWT_SECRET:dev-only-secret-please-override-in-prod-must-be-at-least-256-bits-long}
  expiration-minutes: ${JWT_EXPIRATION_MINUTES:1440}


constants:
  # System-wide constant
  ticket-reservation-duration: ${TICKET_RESERVATION_DURATION:15}
  order-expiration-duration: ${ORDER_EXPIRATION_DURATION:60}


# Actuator (SLR.8.1 telemetry / SLR.8.2 logging visibility).
# Restrict in production by listing only the endpoints you actually want exposed.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

# JWT (test-only secret, never used in prod).
jwt:
  secret: test-only-secret-do-not-use-anywhere-else-must-be-at-least-256-bits-long
  expiration-minutes: 60

# Session TTLs — test values keep absolute time short for fast tests.
session:
  member-ttl-minutes: 60
  guest-idle-timeout-minutes: 10
